name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Xvfb + Qt offscreen libs)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests (headless via Xvfb)
        env:
          QT_QPA_PLATFORM: offscreen   # PySide6 sin display real (pytest-qt)
        run: |
          xvfb-run -a pytest -q --tb=short --junit-xml=test_results.xml || true
          python3 - << 'EOF'
          import sys, xml.etree.ElementTree as ET
          tree = ET.parse("test_results.xml")
          failures = []
          for tc in tree.getroot().iter("testcase"):
              for ch in tc:
                  if ch.tag in ("failure", "error"):
                      failures.append((tc.get("classname",""), tc.get("name",""), ch.text or ""))
          for cls, name, msg in failures:
              print(f"\nFAILED: {cls}::{name}")
              print(msg[:1000])
          sys.exit(len(failures) > 0)
          EOF
