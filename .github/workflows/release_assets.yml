name: Release assets

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Crear ZIP
        run: |
          TAG="${{ github.ref_name }}"
          ZIP="Mossbauer-${TAG}.zip"
          zip "$ZIP" \
            mossbauer_fe33_gui_v2IA.py \
            mossbauer_api_client.py \
            mossbauer_help.py \
            mossbauer_i18n.py \
            mossbauer_updater.py \
            mossbauer_updater_ui.py \
            mossbauer_distribution.py \
            mossbauer_ws5.py \
            fold_mossbauer.py \
            fit_bhf_distribution_cli.py \
            mossbauer_bhf_pipeline.py \
            download_and_fit_calibrations.py \
            install.py \
            requirements.txt \
            README.md \
            README_EN.md \
            CHANGELOG.md \
            INSTALL.md \
            INSTALL_EN.md \
            RELEASES.md \
            BHF_DISTRIBUTION.md \
            PROPUESTAS_SYNCMOSS.md \
            PROPUESTAS_NORMOS.md \
            NORMOS_comparison_improvements.md \
            captura-pantalla-principal.png \
            captura-ajuste-discreto.png \
            captura-distribucion-bhf.png \
            captura-lcurve.png \
            captura-informe-markdown-pdf.png \
            LICENSE
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: Generar checksums SHA-256
        run: |
          sha256sum "$ZIP" > sha256sums.txt
          echo "Checksums generados:"
          cat sha256sums.txt

      - name: Subir assets a la release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "$ZIP" sha256sums.txt
