name: Release assets

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Crear ZIP
        run: |
          TAG="${{ github.ref_name }}"
          ZIP="Fitbauer-${TAG}.zip"
          NOTES="RELEASE_NOTES_${TAG}.md"
          zip -r "$ZIP" \
            fitbauer.py \
            fitbauer \
            fitbauer.bat \
            mossbauer_qt.py \
            mossbauer_api_client.py \
            mossbauer_help.py \
            mossbauer_i18n.py \
            mossbauer_updater.py \
            mossbauer_distribution.py \
            mossbauer_ws5.py \
            mossbauer_fit_cli.py \
            fold_mossbauer.py \
            fit_bhf_distribution_cli.py \
            mossbauer_bhf_pipeline.py \
            install.py \
            Fitbauer.spec \
            requirements.txt \
            README.md \
            README_EN.md \
            CHANGELOG.md \
            INSTALL.md \
            INSTALL_EN.md \
            BHF_DISTRIBUTION.md \
            core \
            layout \
            assets \
            locales \
            docs/img \
            LICENSE \
            data_sample
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"
          echo "NOTES=$NOTES" >> "$GITHUB_ENV"

      - name: Generar checksums SHA-256
        run: |
          sha256sum "$ZIP" > sha256sums.txt
          echo "Checksums generados:"
          cat sha256sums.txt

      - name: Crear o actualizar release desde tag
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE_FLAG=""
          case "$TAG" in
            *alpha*|*beta*|*rc*|*pre*|*dev*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          # Construir args de notas como array para evitar word-splitting
          if [ -f "$NOTES" ]; then
            NOTES_ARGS=(--notes-file "$NOTES")
          else
            NOTES_ARGS=(--notes "Release $TAG. ZIP instalable del programa, documentación y checksums SHA-256.")
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "Fitbauer $TAG" ${PRERELEASE_FLAG:+"$PRERELEASE_FLAG"} "${NOTES_ARGS[@]}"
            gh release upload "$TAG" "$ZIP" sha256sums.txt --clobber
          else
            gh release create "$TAG" "$ZIP" sha256sums.txt \
              --title "Fitbauer $TAG" \
              ${PRERELEASE_FLAG:+"$PRERELEASE_FLAG"} \
              "${NOTES_ARGS[@]}"
          fi

      - name: Subir assets a release publicada manualmente
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f "$NOTES" ]; then
            gh release edit "${{ github.ref_name }}" --notes-file "$NOTES"
          fi
          gh release upload "${{ github.ref_name }}" "$ZIP" sha256sums.txt --clobber
