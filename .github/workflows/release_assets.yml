name: Release assets

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Crear ZIP
        run: |
          TAG="${{ github.ref_name }}"
          ZIP="Mossbauer-${TAG}.zip"
          NOTES="RELEASE_NOTES_${TAG}.md"
          zip -r "$ZIP" \
            mossbauer_fe33_gui_v2IA.py \
            mossbauer_app.py \
            mossbauer_api_client.py \
            mossbauer_help.py \
            mossbauer_i18n.py \
            mossbauer_updater.py \
            mossbauer_updater_ui.py \
            mossbauer_distribution.py \
            mossbauer_ws5.py \
            fold_mossbauer.py \
            fit_bhf_distribution_cli.py \
            mossbauer_bhf_pipeline.py \
            download_and_fit_calibrations.py \
            install.py \
            mossbauer \
            mossbauer.bat \
            requirements.txt \
            README.md \
            README_EN.md \
            CHANGELOG.md \
            INSTALL.md \
            INSTALL_EN.md \
            RELEASES.md \
            BHF_DISTRIBUTION.md \
            PROPUESTAS_SYNCMOSS.md \
            PROPUESTAS_NORMOS.md \
            NORMOS_comparison_improvements.md \
            core \
            layout \
            panels \
            assets \
            locales \
            captura-pantalla-principal.png \
            captura-ajuste-discreto.png \
            captura-distribucion-bhf.png \
            captura-lcurve.png \
            captura-informe-markdown-pdf.png \
            LICENSE \
            data_sample
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"
          echo "NOTES=$NOTES" >> "$GITHUB_ENV"

      - name: Generar checksums SHA-256
        run: |
          sha256sum "$ZIP" > sha256sums.txt
          echo "Checksums generados:"
          cat sha256sums.txt

      - name: Crear o actualizar release desde tag
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_ARG="--notes Release ${{ github.ref_name }}. ZIP installable del programa, documentación y checksums SHA-256."
          if [ -f "$NOTES" ]; then
            NOTES_ARG="--notes-file $NOTES"
          fi
          PRERELEASE_FLAG=""
          case "${{ github.ref_name }}" in
            *alpha*|*beta*|*rc*|*pre*|*dev*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" --title "Mossbauer ${{ github.ref_name }}" $PRERELEASE_FLAG $NOTES_ARG
            gh release upload "${{ github.ref_name }}" "$ZIP" sha256sums.txt --clobber
          else
            gh release create "${{ github.ref_name }}" "$ZIP" sha256sums.txt \
              --title "Mossbauer ${{ github.ref_name }}" \
              $PRERELEASE_FLAG \
              $NOTES_ARG
          fi

      - name: Subir assets a release publicada manualmente
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f "$NOTES" ]; then
            gh release edit "${{ github.ref_name }}" --notes-file "$NOTES"
          fi
          gh release upload "${{ github.ref_name }}" "$ZIP" sha256sums.txt --clobber
